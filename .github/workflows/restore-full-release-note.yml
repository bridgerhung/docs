name: Restore full release note

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/restore-full-release-note.yml

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore release note
        run: python scripts/restore_release_note_from_parts.py

      - name: Remove one-time restoration files
        run: |
          rm -rf tmp/release-note-restore
          rm -f scripts/restore_release_note_from_parts.py
          rm -f .github/workflows/restore-full-release-note.yml

      - name: Commit restored page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "fix: restore complete 2026-07-19 release note"
          git push
