name: Repair documentation pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/repair-docs-pages.yml
      - scripts/repair_docs_pages.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Repair navigation and scripts
        run: python3 scripts/repair_docs_pages.py

      - name: Commit repaired pages
        shell: bash
        run: |
          if git diff --quiet -- public; then
            echo "No page changes were needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public
          git commit -m "fix: apply global navbar and restore image zoom"
          git push
