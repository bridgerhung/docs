<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <meta name="description" content="AI 英語面試練習系統發布紀錄入口，整理最新版本與歷史公告。">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="zh_TW">
  <meta property="og:title" content="AI 英語面試練習系統｜發布紀錄">
  <meta property="og:description" content="查看最新穩定版與歷史發布內容。">
  <meta property="og:image" content="/assets/images/20260720-og-img.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="AI 英語面試練習系統｜發布紀錄">
  <meta name="twitter:description" content="查看最新穩定版與歷史發布內容。">
  <meta name="twitter:image" content="/assets/images/20260720-og-img.png">
  <title>AI 英語面試練習系統｜發布紀錄</title>
  <link rel="stylesheet" href="/assets/css/site.css">
  <style>
    .release-tools{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin:0 0 20px}
    .release-search{width:min(100%,360px);padding:11px 13px;border:1px solid var(--line);border-radius:11px;background:#fff;color:var(--text);font:inherit}
    .release-status{color:#607078;font-size:14px;font-weight:750}
    .release-card{display:flex;flex-direction:column;gap:12px}
    .release-card h2{margin:0;font-size:22px}.release-card p{margin:0 0 6px}.release-card .button{align-self:flex-start;margin-top:auto}
    .release-card__meta{display:flex;flex-wrap:wrap;align-items:center;gap:8px;color:#607078;font-size:13px;font-weight:750}
  </style>
</head>
<body>
  <header class="hero">
    <div class="shell">
      <div class="hero-panel">
        <span class="badge">發布紀錄</span>
        <h1>AI 英語面試練習系統</h1>
        <p class="subtitle">release-notes</p>
        <p class="lead">這裡整理每次穩定版更新、開發紀事與重要公告。每篇 HTML 可自由設計，索引由資料檔自動整理。</p>
        <div class="hero-actions">
          <a class="button primary" id="latestReleaseButton" href="#releaseList">載入最新版本中…</a>
          <a class="button" href="/">回首頁</a>
        </div>
      </div>
    </div>
  </header>

  <main class="layout" style="grid-template-columns:1fr; width:min(100% - 24px,1180px);">
    <section class="section">
      <div class="release-tools">
        <div>
          <h2 style="margin-bottom:4px">版本列表</h2>
          <div class="release-status" id="releaseStatus">正在載入發布紀錄…</div>
        </div>
        <label>
          <span class="visually-hidden">搜尋發布紀錄</span>
          <input class="release-search" id="releaseSearch" type="search" placeholder="搜尋日期、版本或內容">
        </label>
      </div>
      <div class="card-grid" id="releaseList" aria-live="polite">
        <p class="note">正在載入發布紀錄…</p>
      </div>
    </section>
  </main>

  <footer class="footer">© 2026 洪名琮</footer>
  <script src="/assets/js/site.js"></script>
  <script src="/release-notes/index.js"></script>
</body>
</html>
