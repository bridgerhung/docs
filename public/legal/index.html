<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <meta name="description" content="AI 英語面試練習系統使用規範與個人資料告知事項。">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="zh_TW">
  <meta property="og:title" content="使用規範與個資告知｜AI 英語面試練習系統">
  <meta property="og:description" content="閱讀 AI 英語面試練習系統使用規範與個人資料告知事項。">
  <meta property="og:image" content="/assets/images/ai-english-oral-interview-system-og.png">
  <title>使用規範與個資告知｜AI 英語面試練習系統</title>
  <style>
    :root{color-scheme:light;--bg:#f4f7f5;--paper:#fff;--text:#253238;--muted:#607078;--heading:#14364a;--line:#d9e2de;--accent:#245c8a}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif}
    header{padding:58px 20px 34px;background:linear-gradient(135deg,#eaf4ef,#edf3f8)}
    .shell{width:min(100% - 32px,900px);margin:auto}
    h1{margin:0;color:var(--heading);font-size:clamp(32px,5vw,48px);line-height:1.25}
    .lead{margin:14px 0 0;color:var(--muted);font-size:17px;line-height:1.8}
    main{padding:30px 0 50px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
    .card{display:flex;flex-direction:column;min-height:220px;padding:26px;border:1px solid var(--line);border-radius:18px;background:var(--paper);color:var(--text);text-decoration:none;box-shadow:0 12px 30px rgba(19,37,31,.07);transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
    .card:hover{transform:translateY(-3px);border-color:#b9d4ca;box-shadow:0 18px 40px rgba(19,37,31,.11)}
    .eyebrow{display:inline-block;align-self:flex-start;margin-bottom:14px;padding:5px 10px;border-radius:999px;background:#edf3f8;color:var(--accent);font-size:12px;font-weight:800}
    .card h2{margin:0 0 10px;color:var(--heading);font-size:25px;line-height:1.4}
    .card p{margin:0;color:var(--muted);line-height:1.75}
    .open{margin-top:auto;padding-top:20px;color:var(--accent);font-weight:800}
    footer{text-align:center;padding:0 20px 34px;color:var(--muted);font-size:13px}
    @media(max-width:700px){header{padding-top:40px}.grid{grid-template-columns:1fr}.card{min-height:0}}
  </style>
</head>
<body>
  <header>
    <div class="shell">
      <h1>使用規範與個資告知</h1>
      <p class="lead">請選擇要閱讀的文件。</p>
    </div>
  </header>

  <main>
    <div class="shell grid">
      <a class="card" href="/legal/system-terms/">
        <span class="eyebrow">系統使用</span>
        <h2>AI 英語面試練習系統使用規範</h2>
        <p>說明帳號安全、作答與錄音內容、AI 輔助功能、禁止行為及系統使用方式。</p>
        <span class="open">開啟文件 →</span>
      </a>

      <a class="card" href="/legal/privacy-notice/">
        <span class="eyebrow">個人資料</span>
        <h2>個人資料蒐集、處理及利用告知事項</h2>
        <p>說明系統蒐集的資料、使用方式、保存期間、第三方服務及聯絡方式。</p>
        <span class="open">開啟文件 →</span>
      </a>
    </div>
  </main>

  <footer>Copyright © 2026 洪名琮 Ming-Tsung Hung</footer>
</body>
</html>
