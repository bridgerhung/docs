<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,follow">
  <title>個人資料蒐集、處理及利用告知事項｜版本 2026-07-21.2</title>
  <style>
    body{margin:0;font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#f4f7f5;color:#253238}
    .status{max-width:760px;margin:12vh auto;padding:28px;border:1px solid #d9e2de;border-radius:18px;background:#fff;box-shadow:0 18px 44px rgba(19,37,31,.09)}
    .status h1{margin:0 0 10px;font-size:24px;color:#14364a}.status p{margin:8px 0}.status a{color:#245c8a}
  </style>
</head>
<body>
  <main class="status" id="status">
    <h1>正在載入個人資料告知事項</h1>
    <p>固定版本：2026-07-21.2</p>
    <p>本頁載入的是 Git commit <code>a25a4583cab41f91bf5df7f24208e8b71b7c4f0d</code> 中保存的核准文件。</p>
    <p><a href="https://github.com/bridgerhung/docs/blob/a25a4583cab41f91bf5df7f24208e8b71b7c4f0d/public/legal/privacy-notice/index.html">無法載入時，開啟 GitHub 封存內容</a></p>
  </main>
  <script>
    (() => {
      const source = 'https://raw.githubusercontent.com/bridgerhung/docs/a25a4583cab41f91bf5df7f24208e8b71b7c4f0d/public/legal/privacy-notice/index.html';
      fetch(source, { cache: 'force-cache' })
        .then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.text();
        })
        .then((html) => {
          document.open();
          document.write(html);
          document.close();
        })
        .catch((error) => {
          const status = document.getElementById('status');
          status.insertAdjacentHTML('beforeend', `<p><strong>載入失敗：</strong>${String(error)}</p>`);
        });
    })();
  </script>
</body>
</html>
