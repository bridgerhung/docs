<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <meta name="description" content="AI 英語面試練習系統個人資料蒐集、處理及利用告知事項，版本 2026-07-21.2。">
  <meta property="og:type" content="article">
  <meta property="og:locale" content="zh_TW">
  <meta property="og:title" content="個人資料蒐集、處理及利用告知事項">
  <meta property="og:description" content="說明資料類別、保存期間、利用地區、OpenAI API、Oracle Cloud、Cloudflare Turnstile 及當事人權利。">
  <meta property="og:image" content="/assets/images/ai-english-oral-interview-system-og.png">
  <meta name="twitter:card" content="summary_large_image">
  <title>個人資料蒐集、處理及利用告知事項｜版本 2026-07-21.2</title>
  <link rel="stylesheet" href="/assets/css/site.css">
  <style>
    body{margin:0;font-family:Arial,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#f4f7f5;color:#253238}
    .status{max-width:760px;margin:12vh auto;padding:28px;border:1px solid #d9e2de;border-radius:18px;background:#fff;box-shadow:0 18px 44px rgba(19,37,31,.09)}
    .status h1{margin:0 0 10px;font-size:24px;color:#14364a}.status p{margin:8px 0}.status a{color:#245c8a}
  </style>
</head>
<body>
  <main class="status" id="status">
    <h1>正在載入個人資料告知事項</h1>
    <p>版本：2026-07-21.2</p>
    <p>若頁面未自動顯示，可重新整理後再試。</p>
  </main>
  <script>
    (() => {
      const source = 'https://raw.githubusercontent.com/bridgerhung/docs/a25a4583cab41f91bf5df7f24208e8b71b7c4f0d/public/legal/privacy-notice/index.html';
      const removedSentence = [
        '部分功能亦可能要求 OpenAI 回傳',
        '字級時間資訊，以計算語速、',
        '停頓次數、停頓時間及其他口語流暢度指標。'
      ].join('');

      fetch(source, { cache: 'force-cache' })
        .then((response) => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.text();
        })
        .then((html) => {
          const documentCopy = new DOMParser().parseFromString(html, 'text/html');
          [...documentCopy.querySelectorAll('p')].forEach((paragraph) => {
            if (paragraph.textContent.trim() === removedSentence) paragraph.remove();
          });
          document.open();
          document.write('<!DOCTYPE html>\n' + documentCopy.documentElement.outerHTML);
          document.close();
        })
        .catch((error) => {
          const status = document.getElementById('status');
          status.insertAdjacentHTML('beforeend', `<p><strong>載入失敗：</strong>${String(error)}</p>`);
        });
    })();
  </script>
</body>
</html>
